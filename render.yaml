services:
  - type: web
    name: erp-empi-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: ENV
        value: production
      - key: API_PORT
        value: 10000
      - key: FRONTEND_URL
        fromService:
          type: web
          name: erp-empi-web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: DB_WRITE_DSN
        fromDatabase:
          name: erp-empi-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_MINUTES
        value: 10080
      - key: ADMIN_NAME
        value: Administrador EMPI
      - key: ADMIN_CPF
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_MARKUP_PERCENT
        value: 10
      - key: ADMIN_MACHINE_FEE_PERCENT
        value: 0
      - key: ADMIN_INSTALLMENT_FEE_PERCENT
        value: 0

  - type: cron
    name: erp-empi-keepalive
    runtime: node
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: "true"
    startCommand: "node -e \"fetch('https://' + process.env.API_HOST + '/health').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))\""
    envVars:
      - key: API_HOST
        fromService:
          type: web
          name: erp-empi-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME

  - type: web
    name: erp-empi-web
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    healthCheckPath: /login
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NUXT_PUBLIC_APP_NAME
        value: EMPI ERP
      - key: NUXT_API_BASE
        value: https://erp-empi-api.onrender.com
      - key: NUXT_PUBLIC_API_BASE_URL
        value: https://erp-empi-api.onrender.com/api

databases:
  - name: erp-empi-db
    databaseName: empi
    user: empi
    plan: basic-256mb
    diskSizeGB: 5
    postgresMajorVersion: "16"
    ipAllowList: []
