services:
  - type: web
    name: erp-empi-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: ENV
        value: production
      - key: API_PORT
        value: 10000
      - key: FRONTEND_URL
        fromService:
          type: web
          name: erp-empi-web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: DB_WRITE_DSN
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_MINUTES
        value: 10080
      - key: ADMIN_NAME
        value: Administrador EMPI
      - key: ADMIN_CPF
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_MARKUP_PERCENT
        value: 10
      - key: ADMIN_MACHINE_FEE_PERCENT
        value: 0
      - key: ADMIN_INSTALLMENT_FEE_PERCENT
        value: 0

  - type: web
    name: erp-empi-web
    runtime: static
    buildCommand: corepack enable && corepack prepare pnpm@10.30.1 --activate && pnpm --dir frontend install --frozen-lockfile=false && pnpm --dir frontend generate
    staticPublishPath: frontend/.output/public
    autoDeployTrigger: commit
    envVars:
      - key: NUXT_PUBLIC_APP_NAME
        value: EMPI ERP
      - key: NUXT_PUBLIC_API_HOST
        fromService:
          type: web
          name: erp-empi-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
